settings.search.item.tag:
  en: "tag:Name — Show files with that tag (optional text filters by name)"
  zh-CN: "tag:标签名 — 显示带该标签的文件（后面可加文字再按文件名过滤）"
  zh-HK: "tag:標籤名 — 顯示帶該標籤的檔案（後面可加文字再按檔名過濾）"
settings.search.item.aqs:
  en: "$kind:=document — Windows indexed search (AQS syntax after $)"
  zh-CN: "$kind:=document — Windows 索引搜索（$ 后为 AQS 语法）"
  zh-HK: "$kind:=document — Windows 索引搜尋（$ 後為 AQS 語法）"
settings.search.item.aqs_fallback:
  en: "If Windows Search is unavailable, AQS queries fall back to recursive file-name scan"
  zh-CN: "Windows 索引不可用时，AQS 查询会自动降级为文件名递归扫描"
  zh-HK: "Windows 索引不可用時，AQS 查詢會自動降級為檔名遞迴掃描"
settings.search.item.aqs_examples:
  en: "Examples: $*.pdf, $datemodified:this week, $kind:=picture"
  zh-CN: "示例：$*.pdf、$datemodified:this week、$kind:=picture"
  zh-HK: "示例：$*.pdf、$datemodified:this week、$kind:=picture"
settings.search.item.scope_folder:
  en: "In a folder tab — Search scope is the current folder"
  zh-CN: "在文件夹标签页 — 搜索范围为当前文件夹"
  zh-HK: "在資料夾分頁 — 搜尋範圍為目前資料夾"
settings.search.item.scope_home:
  en: "On Home — Search scope is the home root path"
  zh-CN: "在主页 — 搜索范围为主页根路径"
  zh-HK: "在主頁 — 搜尋範圍為主頁根路徑"
settings.search.item.scope_repeat:
  en: "Searching again from results — Scope stays the same as the previous search"
  zh-CN: "在结果页再次搜索 — 范围与上次搜索相同"
  zh-HK: "在結果頁再次搜尋 — 範圍與上次搜尋相同"
settings.search.item.results_sort:
  en: "Results sort by path by default; Name, Path, and Modified columns are shown"
  zh-CN: "结果默认按路径排序；显示名称、路径、修改时间列"
  zh-HK: "結果預設按路徑排序；顯示名稱、路徑、修改時間欄"
settings.search.item.results_open:
  en: "Double-click a result — Jump to its folder and select the item"
  zh-CN: "双击结果 — 跳转到所在文件夹并选中该项"
  zh-HK: "雙擊結果 — 跳轉到所在資料夾並選中該項"
settings.search.item.results_breadcrumb:
  en: "Breadcrumb shows Original path › Search: query; click the folder part to go back"
  zh-CN: "面包屑显示「原路径 › 搜索: 查询词」；点击文件夹部分可返回"
  zh-HK: "麵包屑顯示「原路徑 › 搜尋: 查詢詞」；點擊資料夾部分可返回"
settings.search.item.results_status:
  en: "Long searches show progress in the status center; cancel stops the scan"
  zh-CN: "耗时搜索在状态栏显示进度；取消可停止扫描"
  zh-HK: "耗時搜尋在狀態列顯示進度；取消可停止掃描"
settings.search.item.history_save:
  en: "Each submitted query (Enter) is saved to recent search history"
  zh-CN: "每次 Enter 提交的查询会保存到最近搜索历史"
  zh-HK: "每次 Enter 提交的查詢會保存到最近搜尋歷史"
settings.search.item.history_panel:
  en: "%{key} — Dropdown shows syntax tips and recent searches (even when history is empty)"
  zh-CN: "%{key} — 下拉面板显示语法提示与最近搜索（无历史时也有提示）"
  zh-HK: "%{key} — 下拉面板顯示語法提示與最近搜尋（無歷史時也有提示）"
