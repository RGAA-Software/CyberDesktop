[package]
name = "workspace"
version = "0.1.0"
edition = "2024"
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/workspace.rs"
doctest = false

[features]
default = ["collab-runtime"]
# Collaboration UI + telemetry + Zed account client init.
collab-runtime = ["dep:client", "dep:telemetry"]
test-support = [
    "client/test-support",
    "http_client/test-support",
    "db/test-support",
    "project/test-support",
    "remote/test-support",
    "session/test-support",
    "settings/test-support",
    "gpui/test-support",
    "fs/test-support",
]

[dependencies]
any_vec.workspace = true
agent_settings.workspace = true
anyhow.workspace = true
async-recursion.workspace = true
client = { workspace = true, optional = true }
chrono.workspace = true
clock.workspace = true
collections.workspace = true
component.workspace = true
db.workspace = true
futures-lite.workspace = true
fs.workspace = true
futures.workspace = true
git.workspace = true
gpui.workspace = true
http_client.workspace = true
itertools.workspace = true
language.workspace = true
log.workspace = true
menu.workspace = true
markdown.workspace = true
node_runtime.workspace = true
parking_lot.workspace = true
postage.workspace = true
project.workspace = true
remote.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
session.workspace = true
settings.workspace = true
smallvec.workspace = true
sqlez.workspace = true
strum.workspace = true
task.workspace = true
telemetry = { workspace = true, optional = true }
theme.workspace = true
theme_settings.workspace = true
ui.workspace = true
util.workspace = true
uuid.workspace = true
zed_actions.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
windows.workspace = true

