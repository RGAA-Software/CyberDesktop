[package]
name = "project"
version = "0.1.0"
edition = "2024"
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/project.rs"
doctest = false
test = false

[[test]]
name = "integration"
required-features = ["test-support"]
path = "tests/integration/project_tests.rs"

[features]
default = ["remote-debug"]
remote-debug = [
    "dep:dap",
]
test-support = [
    "buffer_diff/test-support",
    "client/test-support",
    "language/test-support",
    "remote/test-support",
    "settings/test-support",
    "snippet_provider/test-support",
    "text/test-support",
    "prettier/test-support",
    "worktree/test-support",
    "gpui/test-support",
    "dap/test-support",
]

