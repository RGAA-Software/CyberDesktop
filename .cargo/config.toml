[alias]
cyber_files = "build -p files-app --bin cyber_files"
cyber_files-run = "run -p files-app --bin cyber_files"
cyber_editor = "build -p editor-app --bin cyber_editor"
cyber_editor-run = "run -p editor-app --bin cyber_editor"

[env]
FFMPEG_DIR = "D:/source/CyberFiles/third_party/ffmpeg"

# tree-sitter (`wasm` feature) and wasmtime both embed the Wasm C API. On MSVC, tree-sitter
# object files mark those symbols as dllimport while wasmtime provides them statically in
# .rlib files — link succeeds but MSVC emits many LNK4217 warnings.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/IGNORE:4217"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/IGNORE:4217"]
